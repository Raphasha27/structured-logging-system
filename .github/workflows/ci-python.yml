name: CI - Python Lint & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt ruff mypy
        continue-on-error: true
      - run: ruff check . --fix
        continue-on-error: true
      - run: mypy . --ignore-missing-imports
        continue-on-error: true
